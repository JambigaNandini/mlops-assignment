version: "3"
services:
  postgres:
    image: postgres:12
    environment:
      POSTGRES_USER: marquez
      POSTGRES_PASSWORD: marquez
      POSTGRES_DB: marquez
    ports:
      - "5432:5432"

  marquez:
    image: marquezproject/marquez
    environment:
      MARQUEZ_DB_USER: marquez
      MARQUEZ_DB_PASSWORD: marquez
      MARQUEZ_DB_HOST: postgres
      MARQUEZ_DB_PORT: 5432
      MARQUEZ_DB_NAME: marquez
    ports:
      - "5000:5000"
      - "3000:3000"
    depends_on:
      - postgres
