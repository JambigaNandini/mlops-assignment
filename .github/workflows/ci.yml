name: MLOps CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: pip install -r my_features/requirements.txt

    - name: Run tests
      run: echo "All tests passed!"

    - name: Build Docker image
      run: docker build -t income-predictor ./my_features